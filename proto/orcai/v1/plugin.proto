syntax = "proto3";
package orcai.v1;
option go_package = "github.com/adam-stokes/orcai/proto/orcai/v1;orcaiv1";

import "google/protobuf/struct.proto";

message Empty {}

message PluginInfo {
  string name               = 1;
  string version            = 2;
  string description        = 3;
  repeated string capabilities = 4;
}

message StartRequest {
  string bus_address = 1;
}

message StartResponse {}

message StatusResponse {
  string state   = 1;
  string message = 2;
}

// ExecuteRequest is a single invocation: send one request, receive a stream of chunks.
// args holds the primary input text under "input" and any additional metadata;
// structured types are supported via google.protobuf.Struct.
message ExecuteRequest {
  google.protobuf.Struct args = 1;
}

// ExecuteResponse is one chunk of a streaming execution.
// When done is true the stream is complete. error is only set on the final message
// if the execution failed; a clean completion has done=true and error="".
// payload is either a streaming text chunk or a structured output map.
message ExecuteResponse {
  oneof payload {
    string chunk                = 1;
    google.protobuf.Struct output = 4;
  }
  bool   done  = 2;
  string error = 3;
}

message Capability {
  string name          = 1;
  string input_schema  = 2;
  string output_schema = 3;
}

message CapabilityList {
  repeated Capability items = 1;
}

service OrcaiPlugin {
  rpc GetInfo(Empty)             returns (PluginInfo);
  rpc Start(StartRequest)        returns (StartResponse);
  rpc Stop(Empty)                returns (Empty);
  rpc GetStatus(Empty)           returns (StatusResponse);
  rpc Execute(ExecuteRequest)    returns (stream ExecuteResponse);
  rpc Capabilities(Empty)        returns (CapabilityList);
}
