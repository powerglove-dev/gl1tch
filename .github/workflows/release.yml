name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Clone plugins repo
        run: |
          git clone https://github.com/8op-org/plugins.git ../plugins

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate site release.json
        env:
          ACTOR: ${{ github.actor }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          REPO="8op-org/gl1tch"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          printf '{\n  "version": "%s",\n  "repo": "%s",\n  "assets": {\n    "darwin_arm64":  "%s/glitch_%s_darwin_arm64.tar.gz",\n    "darwin_amd64":  "%s/glitch_%s_darwin_amd64.tar.gz",\n    "linux_amd64":   "%s/glitch_%s_linux_amd64.tar.gz",\n    "linux_arm64":   "%s/glitch_%s_linux_arm64.tar.gz",\n    "windows_amd64": "%s/glitch_%s_windows_amd64.zip"\n  }\n}\n' \
            "${TAG}" "${REPO}" \
            "${BASE}" "${VERSION}" \
            "${BASE}" "${VERSION}" \
            "${BASE}" "${VERSION}" \
            "${BASE}" "${VERSION}" \
            "${BASE}" "${VERSION}" \
            > site/public/release.json
          git config user.name "github-actions[bot]"
          git config user.email "${ACTOR}@users.noreply.github.com"
          git add site/public/release.json
          if git diff --cached --quiet; then
            echo "release.json unchanged."
          else
            git commit -m "chore: update release.json for ${TAG}"
            git push origin HEAD:main
          fi

      - name: Generate site changelog
        env:
          ACTOR: ${{ github.actor }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          CHANGELOG_FILE="site/src/content/changelog/${TAG}.md"

          if [ -f "${CHANGELOG_FILE}" ]; then
            echo "Changelog ${CHANGELOG_FILE} already exists — skipping."
            exit 0
          fi

          # Read dist/CHANGELOG.md if it exists, otherwise use a placeholder
          if [ -f "dist/CHANGELOG.md" ]; then
            GORELEASER_CHANGELOG="dist/CHANGELOG.md"
          else
            echo "dist/CHANGELOG.md not found — using placeholder."
            GORELEASER_CHANGELOG=""
          fi

          # Extract feat/fix lines as YAML list items for highlights
          if [ -n "${GORELEASER_CHANGELOG}" ]; then
            HIGHLIGHTS=$(grep -E '^[*-] (feat|fix):' "${GORELEASER_CHANGELOG}" | sed 's/^[*-] //' | while IFS= read -r line; do
              printf '  - "%s"\n' "${line//\"/\\\"}"
            done)
          fi

          if [ -z "${HIGHLIGHTS}" ]; then
            HIGHLIGHTS='  - "Initial release"'
          fi

          TODAY=$(date +%Y-%m-%d)

          mkdir -p "site/src/content/changelog"

          cat > "${CHANGELOG_FILE}" << EOF
          ---
          version: "${VERSION}"
          date: "${TODAY}"
          highlights:
          ${HIGHLIGHTS}
          breaking: false
          ---
          EOF

          # Normalize indentation (remove leading spaces from heredoc)
          sed -i 's/^          //' "${CHANGELOG_FILE}"

          git config user.name "github-actions[bot]"
          git config user.email "${ACTOR}@users.noreply.github.com"
          git add "${CHANGELOG_FILE}"

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: add changelog for ${TAG}"
            git push origin HEAD:main
          fi

  deploy-site:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (includes release.json + changelog committed by release job)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Deploy to GitHub Pages (8op.org)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/dist
          publish_branch: gh-pages
          cname: 8op.org
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
