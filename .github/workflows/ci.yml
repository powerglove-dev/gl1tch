name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  smoke-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ hashFiles('.github/ollama-models.txt') }}
          restore-keys: ollama-

      - name: Install ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start ollama
        run: ollama serve &

      - name: Pull model
        run: ollama pull llama3.2:1b

      - name: Run smoke tests
        env:
          GLITCH_SMOKE_MODEL: llama3.2:1b
        run: go test -tags integration -timeout 5m -run TestSmoke ./internal/pipeline/...
