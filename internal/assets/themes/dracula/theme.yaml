name: dracula
display_name: "Dracula"
header_pattern: texture
gradient_border:
  - "#ff79c6"
  - "#bd93f9"
palette:
  bg:      "#282a36"
  fg:      "#f8f8f2"
  accent:  "#ff79c6"
  dim:     "#6272a4"
  border:  "#44475a"
  error:   "#ff5555"
  success: "#50fa7b"
borders:
  style: light
statusbar:
  format: " {session} · {provider} · {model} "
  bg: palette.bg
  fg: palette.accent

header_style:
  panels:
    pipelines:
      accent: "#ff79c6"
      text:   "#282a36"
    agent_runner:
      accent: "#ff79c6"
      text:   "#282a36"
    signal_board:
      accent: "#ff79c6"
      text:   "#282a36"
    activity_feed:
      accent: "#ff79c6"
      text:   "#282a36"
    inbox:
      accent: "#ff79c6"
      text:   "#282a36"
    cron:
      accent: "#ff79c6"
      text:   "#282a36"
    log_output:
      accent: "#6272a4"
      text:   "#f8f8f2"
    modal:
      accent: "#ff79c6"
      text:   "#282a36"

modal:
  bg:       palette.bg
  border:   palette.accent
  title_bg: palette.accent
  title_fg: palette.bg
