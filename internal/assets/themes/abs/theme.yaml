name: abs
display_name: "ABS Dark"
header_pattern: waves
palette:
  bg:      "#282a36"
  fg:      "#f8f8f2"
  accent:  "#bd93f9"
  dim:     "#6272a4"
  border:  "#44475a"
  error:   "#ff5555"
  success: "#50fa7b"
borders:
  style: light
statusbar:
  format: " {session} · {provider} · {model} "
  bg: palette.bg
  fg: palette.accent
splash: splash.ans

# Dynamic header generation — always fills the exact panel width.
# top_char/bot_char default to ▄/▀; border_char defaults to │ (matches boxRow).
# accent: bar color, text: title text color. Both accept palette refs or hex.
header_style:
  panels:
    pipelines:
      accent: "#bd93f9"
      text:   "#282a36"
    agent_runner:
      accent: "#bd93f9"
      text:   "#282a36"
    signal_board:
      accent: "#bd93f9"
      text:   "#282a36"
    activity_feed:
      accent: "#bd93f9"
      text:   "#282a36"
    inbox:
      accent: "#bd93f9"
      text:   "#282a36"
    cron:
      accent: "#bd93f9"
      text:   "#282a36"
    modal:
      accent: "#bd93f9"
      text:   "#282a36"

# Optional fixed-width .ans sprite overrides (advanced customization).
# List variants widest-first; SpriteLines uses the first that fits the panel.
# These override DynamicHeader only when a sprite exactly matches the panel width.
# Leave empty or omit to always use DynamicHeader.
# headers:
#   pipelines:
#     - headers/full/pipelines.ans

modal:
  bg: palette.bg
  border: palette.accent
  title_bg: palette.accent
  title_fg: palette.bg
