# Taskfile.yml — GLITCH task runner
#
# Prerequisites:
#   Task v3:      go install github.com/go-task/task/v3/cmd/task@latest
#   GoReleaser:   go install github.com/goreleaser/goreleaser/v2@latest
#                 (or: brew install goreleaser)
#   tmux:         brew install tmux
#                 (required — glitch manages sessions and uses tmux for agent execution)
#   ollama:       https://ollama.com  (brew install ollama)
#                 (required — local model used for internal intelligence: manifest section
#                  relevance scoring, capability summarization, brain context retrieval.
#                  glitch pulls a model automatically if none is available.
#                  ensures a free, private, always-available model for internal ops)
#
# Usage:
#   task --list          show all available tasks
#   task build           compile binary to bin/glitch
#   task install         build and install to GOPATH/bin + ~/.local/bin symlink
#   task dev             clean-slate build from source (wipes config/data, run manually)
#   task prod            install fresh build from source to GOPATH/bin (run manually)
#   task run             start glitch (non-destructive, assumes already installed)
#   task run:clean       wipe db/config, kill tmux sessions, then start glitch
#   task release:tag VERSION=v1.2.3   create signed git tag for release

version: "3"

vars:
  BINARY: glitch

tasks:
  # ---------------------------------------------------------------------------
  # Core build tasks
  # ---------------------------------------------------------------------------

  backup:
    desc: "Snapshot current glitch config/data to .backups/ (gitignored)"
    cmds:
      - mkdir -p .backups
      - glitch backup --output .backups/glitch-backup-$(date +%Y%m%d%H%M%S).tar.gz

  build:
    desc: "Compile the glitch binary to bin/glitch and tuishot renderer"
    cmds:
      - go build -o bin/{{.BINARY}} .
      - go build -o ~/.local/bin/tuishot ./cmd/tuishot/

  install:
    desc: "Build and install glitch to GOPATH/bin; symlink into ~/.local/bin"
    deps: [backup, build]
    cmds:
      - cp bin/{{.BINARY}} $(go env GOPATH)/bin/{{.BINARY}}
      - codesign --force --sign - $(go env GOPATH)/bin/{{.BINARY}}
      - ln -sf $(go env GOPATH)/bin/{{.BINARY}} ~/.local/bin/{{.BINARY}}

  test:
    desc: "Run all Go tests"
    cmds:
      - go test ./...

  clean:
    desc: "Remove compiled binaries from bin/"
    cmds:
      - rm -f bin/{{.BINARY}} bin/{{.BINARY}}-debug

  # ---------------------------------------------------------------------------
  # Run tasks
  # ---------------------------------------------------------------------------

  run:
    desc: "Start glitch (non-destructive — does NOT wipe db or config)"
    cmds:
      - "{{.BINARY}}"

  run:pipeline-builder:
    desc: "Open the interactive pipeline builder TUI"
    cmds:
      - "{{.BINARY}} pipeline-builder"

  run:pipeline-builder:start:
    desc: "Open pipeline builder in a new tmux window (glitch-pipeline-builder)"
    cmds:
      - "{{.BINARY}} pipeline-builder start"

  run:widget:jump-window:
    desc: "Open the standalone jump window widget"
    cmds:
      - "{{.BINARY}} widget jump-window"

  run:clean:
    desc: "Wipe db/config, kill tmux sessions (glitch, glitch-cron), then start glitch (mirrors old 'make run')"
    cmds:
      - tmux detach-client -s glitch 2>/dev/null || true
      - tmux kill-session -t glitch 2>/dev/null || true
      - tmux kill-session -t glitch-cron 2>/dev/null || true
      - rm -f ~/.config/glitch/layout.yaml ~/.config/glitch/keybindings.yaml
      - |
        if [ -f ~/.local/share/glitch/glitch.db ]; then
          cp ~/.local/share/glitch/glitch.db ~/.local/share/glitch/glitch.db.bak.$(date +%Y%m%d%H%M%S)
          ls -t ~/.local/share/glitch/glitch.db.bak.* 2>/dev/null | tail -n +6 | xargs rm -f
        fi
      - rm -f ~/.local/share/glitch/glitch.db
      - rm -f ~/.config/glitch/inbox-read.json
      - "{{.BINARY}}"

  dev:
    desc: "New-user clean build: backup+wipe config/data/binaries, rebuild from source, fetch APM agents (run manually)"
    deps: [backup]
    cmds:
      - tmux detach-client -s glitch 2>/dev/null || true
      - tmux kill-session -t glitch 2>/dev/null || true
      - tmux kill-session -t glitch-cron 2>/dev/null || true
      - |
        if [ -d ~/.config/glitch ]; then
          cp -r ~/.config/glitch ~/.config/glitch.bak.$(date +%Y%m%d%H%M%S)
          ls -dt ~/.config/glitch.bak.* 2>/dev/null | tail -n +6 | while IFS= read -r f; do rm -rf "$f"; done
        fi
      - |
        if [ -d ~/.local/share/glitch ]; then
          cp -r ~/.local/share/glitch ~/.local/share/glitch.bak.$(date +%Y%m%d%H%M%S)
          ls -dt ~/.local/share/glitch.bak.* 2>/dev/null | tail -n +6 | while IFS= read -r f; do rm -rf "$f"; done
        fi
      - rm -rf ~/.config/glitch ~/.local/share/glitch
      - rm -f bin/{{.BINARY}} bin/{{.BINARY}}-debug
      - mkdir -p bin
      - go build -o bin/{{.BINARY}} .
      - |
        if command -v apm >/dev/null 2>&1 && [ -f apm.yml ]; then
          echo "Fetching APM agents..."
          apm install && apm compile
        else
          echo "APM not installed or apm.yml not found — skipping agent fetch (run: task apm:install && task apm:fetch)"
        fi

  prod:
    desc: "Daily driver: install fresh build from source to GOPATH/bin and ~/.local/bin (run manually)"
    cmds:
      - go build -o bin/{{.BINARY}} .
      - cp bin/{{.BINARY}} $(go env GOPATH)/bin/{{.BINARY}}
      - ln -sf $(go env GOPATH)/bin/{{.BINARY}} ~/.local/bin/{{.BINARY}}

  # ---------------------------------------------------------------------------
  # Debug tasks
  # ---------------------------------------------------------------------------

  debug-build:
    desc: "Compile glitch with debug symbols (no optimisation) to bin/glitch-debug"
    cmds:
      - go build -gcflags="all=-N -l" -o bin/{{.BINARY}}-debug .

  debug:
    desc: "Build debug binary and start Delve headless on :2345"
    deps: [debug-build]
    cmds:
      - |
        echo "Delve listening on :2345 — connect with: task debug:connect"
        dlv exec --headless --listen=:2345 --api-version=2 ./bin/{{.BINARY}}-debug

  debug:connect:
    desc: "Connect to a running Delve session on :2345"
    cmds:
      - dlv connect :2345

  debug:tmux:
    desc: "Build debug binary and launch the debug tmux layout via scripts/debug-tmux.sh"
    deps: [debug-build]
    cmds:
      - bash {{.ROOT_DIR}}/scripts/debug-tmux.sh

  # ---------------------------------------------------------------------------
  # APM — Agent Package Manager tasks
  # ---------------------------------------------------------------------------

  apm:install:
    desc: "Install APM CLI (curl installer; idempotent — skips if already at latest)"
    cmds:
      - |
        if command -v apm >/dev/null 2>&1; then
          echo "APM already installed: $(apm --version)"
        else
          echo "Installing APM CLI..."
          curl -sSL https://aka.ms/apm-unix | sh
          echo "APM installed: $(apm --version)"
        fi

  apm:update:
    desc: "Update APM CLI to the latest version"
    cmds:
      - curl -sSL https://aka.ms/apm-unix | sh
      - |
        echo "APM updated: $(apm --version)"

  apm:fetch:
    desc: "Install all agent dependencies from apm.yml and compile tool-native files"
    cmds:
      - apm install
      - apm compile
      - echo "APM agents ready — see .claude/agents/ for deployed files"

  apm:audit:
    desc: "Audit all APM packages for dangerous Unicode patterns"
    cmds:
      - apm audit

  # ---------------------------------------------------------------------------
  # Plugin tasks
  # ---------------------------------------------------------------------------

  plugins:
    desc: "Build and install all core provider plugins from ../glitch-plugins"
    vars:
      PLUGINS_DIR: ../glitch-plugins
    cmds:
      - task -d {{.PLUGINS_DIR}} install

  # ---------------------------------------------------------------------------
  # Integration tests
  # ---------------------------------------------------------------------------

  test:integration:
    desc: "Run all integration tests (requires ollama with llama3.2; override model with GLITCH_SMOKE_MODEL=llama3.2:1b)"
    cmds:
      - go test -tags=integration -timeout=15m -v ./internal/pipeline/...

  test:integration:astro:
    desc: "Run Astro pipeline generation + build test"
    cmds:
      - go test -tags=integration -timeout=15m -v -run TestAstroPipelineGenAndRun ./internal/pipeline/...

  test:integration:docs-audit:
    desc: "Run docs audit test (reads real code + docs, checks for MISSING: lines)"
    cmds:
      - go test -tags=integration -timeout=5m -v -run TestDocsAudit ./internal/pipeline/...

  test:integration:docs-improve:
    desc: "Run full docs-improve end-to-end test (isolated temp repo, real commit; requires ollama + claude API key)"
    cmds:
      - go test -tags=integration -timeout=15m -v -run TestDocsImprove ./internal/pipeline/...

  test:integration:docs-pick:
    desc: "Run pick step test only (fast — validates structured output format)"
    cmds:
      - go test -tags=integration -timeout=5m -v -run TestDocsImprove_PickProducesStructuredOutput ./internal/pipeline/...

  run:docs-improve:
    desc: "Trigger a single docs-improve pipeline cycle against the real repo"
    cmds:
      - glitch pipeline run docs-improve

  # ---------------------------------------------------------------------------
  # Release tasks
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Site — 8op.org
  # ---------------------------------------------------------------------------

  site:dev:
    desc: "Start Astro dev server for 8op.org"
    dir: site
    cmds:
      - npm run dev

  site:build:
    desc: "Full site build: tdf logo + gif + Astro static build"
    cmds:
      - task: site:tdf-logo
      - task: site:logo-gif
      - task: site:astro-build

  site:astro-build:
    desc: "Build Astro static site (8op.org)"
    dir: site
    cmds:
      - npm run build

  site:tdf-logo:
    desc: "Generate GL1TCH ANSI→HTML logo from embedded inertia TDF font"
    cmds:
      - mkdir -p site/src/generated
      - go run ./tools/tdfrender | go run ./tools/ansi2html > site/src/generated/glitch-logo.html

  site:logo-gif:
    desc: "Generate GL1TCH logo GIF using embedded inertia TDF font"
    cmds:
      - go run ./tools/tdf2gif > site/public/glitch-logo.gif

  site:glitch-db:
    desc: "Regenerate GLITCH website response DB via glitch pipeline"
    cmds:
      - glitch pipeline run glitch-db.pipeline.yaml

  site:install:
    desc: "Install site npm dependencies"
    dir: site
    cmds:
      - npm install

  release:snapshot:
    desc: "Build a local snapshot release with GoReleaser (no git tag required)"
    cmds:
      - goreleaser release --snapshot --clean

  release:tag:
    desc: "Create a signed annotated git tag for release. Usage: task release:tag VERSION=v1.2.3"
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: "VERSION is required. Usage: task release:tag VERSION=v1.2.3"
    cmds:
      - git tag -s -a {{.VERSION}} -m "Release {{.VERSION}}"
      - echo ""
      - echo "Tag '{{.VERSION}}' created. Push it to trigger the release workflow:"
      - echo "  git push origin {{.VERSION}}"
