name: glitch-routing-in-session
description: Using @glitch prefix inside a CLI provider session to engage routing
group: console
steps:
  - launch: glitch
  - wait_for: "ask glitch"
  - send: "/session new claude"
  - wait_for: "▶ session: claude"
  - send: "@glitch what sessions do I have?"
  - wait_for: "session"
  - screenshot: glitch_routing_in_session
