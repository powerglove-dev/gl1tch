name: mud-crafting-expand
version: "1"
description: "Invents 1-2 new crafting recipes using only existing item IDs as ingredients"
write_brain: false
game: false

steps:

  # ── 1. Pick recipe theme and ingredient pair ───────────────────────────────
  - id: seed
    executor: shell
    vars:
      cmd: |
        THEMES=("surveillance" "sabotage" "evasion" "deception" "extraction" "counterintel")
        PAIRS=(
          "raw-silicon + copper-wire"
          "data-chip + copper-wire"
          "ice-fragment + coolant-cartridge"
          "server-core + data-chip"
          "packet-sniffer + decryption-key"
          "carbon-blade + ice-fragment"
          "coolant-cartridge + raw-silicon"
          "response-dampener + copper-wire"
        )
        IDX=$(( $(date +%s) % 6 ))
        PIDX=$(( $(date +%s) % 8 ))
        echo "theme: ${THEMES[$IDX]}, primary ingredients: ${PAIRS[$PIDX]}"

  # ── 2a. Try codex (free tier) ─────────────────────────────────────────────
  - id: codex_try
    executor: shell
    needs: [seed]
    vars:
      cmd: |
        SEED="{{get "step.seed.data.value" .}}"
        TMPF=$(mktemp /tmp/mud_codex_XXXXXX.txt)
        TMPOUT=$(mktemp /tmp/mud_codex_out_XXXXXX.txt)
        cat > "$TMPF" << 'PROMPT_END'
        Do not ask clarifying questions. Generate immediately.

        You are a cyberpunk MUD world builder. Generate 1-2 new crafting recipes for a
        gritty near-future cyberspace MUD inspired by William Gibson and Neal Stephenson.

        Seed: SEED_PLACEHOLDER

        EXISTING item IDs you MUST use as ingredients (do not invent new ingredient IDs):
          data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
          keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
          maintenance-log, cascade-resonator, ice-fragment, response-dampener, neural-jack-mk1

        Each recipe output must have a brand-new item id not in that list above.

        Return ONLY raw YAML. No markdown fences. No commentary.

        CRITICAL YAML RULES:
        - All text values must be plain text — no asterisks, no markdown emphasis
        - Multi-line desc fields use YAML block scalar (|) format
        - Every output id must be globally unique kebab-case

        crafting_recipes:
          - id: recipe-<unique-kebab matching output id>
            name: <recipe name, 2-4 words>
            ingredients:
              - {id: <existing item id>, count: <1 or 2>}
              - {id: <existing item id>, count: <1 or 2>}
            output:
              id: <new unique kebab id>
              name: <output item name>
              desc: <1-2 sentences — what it does, cyberpunk flavour>
            skill_req: <integer 0-3>
        PROMPT_END
        sed -i "s/SEED_PLACEHOLDER/$SEED/" "$TMPF"
        codex exec --full-auto -m codex-mini-latest - -o "$TMPOUT" < "$TMPF" 2>/dev/null
        EXIT=$?
        rm -f "$TMPF"
        if [ $EXIT -eq 0 ] && [ -s "$TMPOUT" ]; then
            cat "$TMPOUT"
        fi
        rm -f "$TMPOUT"

  # ── 2b. Fallback: generate via Haiku if codex produced nothing ────────────
  - id: generate
    executor: claude
    no_clarify: true
    model: claude-haiku-4-5-20251001
    needs: [seed, codex_try]
    prompt: |
      Do not ask clarifying questions. Generate immediately.
      {{- $codex := get "step.codex_try.data.value" . }}
      {{- if $codex }}

      Codex has already generated the following YAML. Output it VERBATIM — do not change a single character, do not add commentary, do not reformat.

      {{ $codex }}
      {{- else }}

      You are a cyberpunk MUD world builder. Generate 1-2 new crafting recipes for a
      gritty near-future cyberspace MUD inspired by William Gibson and Neal Stephenson.

      Seed: {{get "step.seed.data.value" .}}

      EXISTING item IDs you MUST use as ingredients (do not invent new ingredient IDs):
        data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
        keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
        maintenance-log, cascade-resonator, ice-fragment, response-dampener, neural-jack-mk1

      Each recipe output must have a brand-new item id not in that list above.

      Return ONLY raw YAML. No markdown fences. No commentary.

      CRITICAL YAML RULES:
      - All text values must be plain text — no asterisks, no markdown emphasis
      - Multi-line desc fields use YAML block scalar (|) format
      - Every output id must be globally unique kebab-case

      crafting_recipes:
        - id: recipe-<unique-kebab matching output id>
          name: <recipe name, 2-4 words>
          ingredients:
            - {id: <existing item id>, count: <1 or 2>}
            - {id: <existing item id>, count: <1 or 2>}
          output:
            id: <new unique kebab id>
            name: <output item name>
            desc: <1-2 sentences — what it does, cyberpunk flavour>
          skill_req: <integer 0-3>
      {{- end }}

  # ── 3. Inject into world.yaml ──────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [generate]
    prompt: "{{get \"step.generate.data.value\" .}}"

  # ── 4. Commit to main ─────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        cd ~/Projects/gl1tch-mud
        git add worlds/cyberspace/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): crafting-expand — $(date +%Y-%m-%d)"
        git push origin main
