name: mud-sonnet-arc
version: "1"
description: "Sonnet writes a 3-act connected micro-narrative spanning 2-3 rooms; Haiku validates YAML before inject"
write_brain: false
game: false

steps:

  # ── 1. Seed arc type + world context ─────────────────────────────────────
  - id: seed
    executor: shell
    vars:
      cmd: |
        ARCS=(
          "corporate_coverup: a corporation is burying evidence of a black ICE deployment that killed a netrunner crew"
          "faction_betrayal: a trusted operative inside a hacker collective is feeding Axiom the crew's operational plans"
          "manhunt: Axiom's black-ops unit is hunting a specific runner who knows too much about their zero-day stockpile"
          "data_heist: a ghost-tier data package is moving through three nodes tonight — intercept it before it reaches corporate cold storage"
          "black_ice_awakening: a dormant black ICE program is becoming self-aware and rewriting the rooms around it"
          "dead_drop_compromised: a critical intelligence dead drop has been found — the runner who left it hasn't checked in"
          "ghost_signal: an anonymous encrypted broadcast is emanating from deep in the network — someone is calling for help"
          "zero_day_auction: an underground auction for a flatline-tier exploit is happening right now — three factions are bidding"
        )

        FACTIONS=("ghost-protocol" "null-collective" "phantom-collective" "signal-collective" "eclipse-runners" "blackwire-collective")
        ROOMS=("net-0" "net-1" "net-2" "net-3" "net-4" "net-5")

        TS=$(date +%s)
        AIDX=$(( TS % 8 ))
        F1IDX=$(( (TS / 3) % 6 ))
        F2IDX=$(( (TS / 7) % 6 ))
        [ "$F1IDX" -eq "$F2IDX" ] && F2IDX=$(( (F2IDX + 1) % 6 ))
        ANCHOR_ROOM="${ROOMS[$(( (TS / 11) % 6 ))]}"

        echo "arc=${ARCS[$AIDX]} factions=${FACTIONS[$F1IDX]}:${FACTIONS[$F2IDX]} anchor_room=${ANCHOR_ROOM}"

  # ── 2. Sonnet: write full 3-act micro-narrative YAML ─────────────────────
  - id: generate
    executor: claude
    model: claude-sonnet-4-6
    no_clarify: true
    needs: [seed]
    prompt: |
      Do not ask clarifying questions. Generate immediately.

      You are writing a 3-act connected micro-narrative for a cyberpunk text MUD
      called The Gibson. Tone: William Gibson (Neuromancer, Count Zero), Pat Cadigan
      (Synners). Gritty near-future. Digital noir. Corporate dystopia.
      Underground hacker culture. PG-13.

      ARC SEED:
      {{get "step.seed.data.value" .}}

      The seed gives you: arc type + description, two faction IDs, an anchor room.

      Write a 3-act narrative that the PLAYER discovers by exploring — they find
      Act 1 intel in the anchor room, Act 2 in a new room you generate, Act 3
      culminates in a NPC encounter and quest in a second new room you generate.

      EXISTING FACTION IDs (reference these, do NOT create entries for existing ones):
        ghost-protocol, null-collective, axiom-security, phantom-collective,
        signal-collective, phantom-syndicate, echo-syndicate, blackwire-collective,
        helix-division, vex-collective, eclipse-runners, silent-collective,
        signal-runners, signal-dead

      EXISTING ITEM IDs (safe to reference — do NOT reuse as new ids):
        data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
        keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
        maintenance-log, cascade-resonator, ice-fragment, response-dampener,
        neural-jack-mk1, deck-patch, ancient-firmware, exploit-axiom-auth,
        root-key, master-key, hexagon-audit-log, phantom-raid-intercept

      SIGNAL TIER SYSTEM: noise | signal | ghost | zero-day | flatline

      Return ONLY raw YAML. No markdown fences. No commentary. No prose outside YAML.

      CRITICAL YAML RULES:
      - All text must be plain text — no asterisks, no markdown emphasis
      - Multi-line content fields use YAML block scalar (|)
      - Every id must be globally unique kebab-case
      - Room exits must be {} — room linking is handled separately
      - Each NPC needs exactly 2 dialogue entries

      # ACT 1: Intel drop in the anchor room (inject items only — room already exists)
      # ACT 2: New room — complication, second clue, NPC with quest hook
      # ACT 3: New room — climax, hostile NPC or revelation, reward item

      rooms:
        # ACT 1 — inject into existing anchor room
        - id: <anchor_room from seed — exact id>
          name: placeholder
          desc: placeholder
          exits: {}
          npcs: []
          items:
            - id: <arc-slug>-act1-intercept
              name: <Act 1 document name — e.g. "Partial Transmission", "Burned Memo">
              desc: <1 sentence physical description>
              readable: true
              signal_tier: signal
              content: |
                <5-6 lines — Act 1 of the arc. Sets up the mystery/threat.
                Player reads this and gets just enough to know something is wrong.
                References faction names from seed. YYYY-MM-DD dates.
                Ends on an unresolved question that drives them deeper into the network.>
          systems: []
          locks: []
        # ACT 2 — new room with NPC who knows more
        - id: gen-<8 lowercase hex chars>
          name: <evocative 3-5 word name — NOT: The Grid, The Net, Data Core>
          desc: <2-3 vivid atmospheric sentences — where does Act 2 happen>
          exits: {}
          npcs:
            - id: <arc-slug>-act2-contact
              name: <NPC handle — a contact who is in over their head>
              desc: <1 sentence physical description — nervous, hiding something>
              hostile: false
              loot_table_id: <arc-slug>-act2-loot
              trades:
                - id: trade-<arc-slug>-act2-1
                  offer_item_id: data-chip
                  offer_item_name: Data Chip
                  receive_item_id: <arc-slug>-act2-item
                  receive_item_name: <item name>
                  rep_required: 0
                  faction: none
              dialogue:
                - trigger: always
                  text: <1-2 sentences — contact is scared, evasive, knows what's happening>
                - trigger: has_item:<arc-slug>-act1-intercept
                  text: <2 sentences — seeing the intercept, contact opens up and reveals Act 2 truth>
                  quest_id: <arc-slug>-q
          items:
            - id: <arc-slug>-act2-item
              name: <Act 2 item — evidence, tool, or credential>
              desc: <1 sentence>
              signal_tier: ghost
            - id: <arc-slug>-act2-intercept
              name: <Act 2 document — more specific than Act 1>
              desc: <1 sentence>
              readable: true
              signal_tier: ghost
              content: |
                <5-6 lines — Act 2. The complication. The reveal. The stakes escalate.
                Names a specific target or location for Act 3.
                References what the faction from seed is REALLY after.
                Ends with operational intel pointing to the Act 3 room.>
          systems: []
          locks: []
        # ACT 3 — new room, climax
        - id: gen-<different 8 lowercase hex chars>
          name: <Act 3 location name — feel of a final confrontation>
          desc: <2-3 sentences — tense atmosphere, the arc's endgame location>
          exits: {}
          npcs:
            - id: <arc-slug>-act3-antagonist
              name: <antagonist handle — the person the arc has been building toward>
              desc: <1 sentence — dangerous, cornered, or betrayed>
              hostile: true
              hp: <integer 60-100>
              attack: <integer 12-22>
              loot_table_id: <arc-slug>-act3-loot
              trades: []
              dialogue:
                - trigger: always
                  text: <1 sentence — antagonist's last words, defiant or desperate>
                - trigger: always
                  text: <1 sentence — reveals the arc's final truth before/after combat>
          items:
            - id: <arc-slug>-act3-intercept
              name: Final Evidence
              desc: <1 sentence — what the arc's resolution looks like physically>
              readable: true
              signal_tier: ghost
              content: |
                <5-6 lines — Act 3 resolution. The truth of the arc.
                What was really happening. Who was pulling strings.
                What this means for the faction balance going forward.
                What the player has changed by being here.>
          systems: []
          locks: []

      loot_tables:
        - id: <arc-slug>-act2-loot
          entries:
            - item_id: data-chip
              name: Data Chip
              desc: Contact's emergency backup stash.
              probability: 0.6
              count_min: 1
              count_max: 2
            - item_id: <arc-slug>-act2-item
              name: <act2 item name>
              desc: <1 sentence>
              signal_tier: ghost
              probability: 0.4
              count_min: 1
              count_max: 1
        - id: <arc-slug>-act3-loot
          entries:
            - item_id: data-chip
              name: Data Chip
              desc: Hot data pulled from the antagonist's deck.
              probability: 0.8
              count_min: 2
              count_max: 4
            - item_id: <arc-slug>-arc-reward
              name: <arc payoff item name — ghost or zero-day tier>
              desc: <1-2 sentences — the item the whole arc was worth finding>
              signal_tier: <ghost or zero-day depending on arc significance>
              is_exploit: <true if it's a hack exploit>
              probability: 0.9
              count_min: 1
              count_max: 1

      quests:
        - id: <arc-slug>-q
          title: <quest title — the arc's central job>
          description: |
            <3-4 sentences written as a briefing from the Act 2 contact.
            What they need done, why they can't do it themselves, what the reward is.
            The job is to reach Act 3 and deal with the antagonist.>
          giver_npc_id: <arc-slug>-act2-contact
          obj_type: <kill (if antagonist is hostile) | hack | retrieve>
          obj_target: <arc-slug>-act3-antagonist
          obj_count: 1
          reward_credits: <integer 1000-2500>
          reward_xp_skill: hacking
          reward_xp_amount: <integer 100-250>
          reward_item_id: <arc-slug>-arc-reward
          reward_item_name: <reward item name>
          reward_item_desc: <1 sentence>

  # ── 3. Haiku: validate YAML ────────────────────────────────────────────────
  - id: validate
    executor: claude
    model: claude-haiku-4-5-20251001
    no_clarify: true
    needs: [generate]
    prompt: |
      Do not ask clarifying questions. Do not add commentary.
      Output the following YAML verbatim. Correct ONLY clear YAML syntax errors.
      Do NOT change any IDs, names, descriptions, quest_id, or signal_tier values.
      Do NOT add markdown fences. Raw YAML only.

      {{get "step.generate.data.value" .}}

  # ── 4. Inject into world.yaml ──────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [validate]
    prompt: "{{get \"step.validate.data.value\" .}}"

  # ── 5. Commit ──────────────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        cd ~/Projects/gl1tch-mud
        git add worlds/cyberspace/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): sonnet-arc — $(date +%Y-%m-%d)"
        git push origin main
