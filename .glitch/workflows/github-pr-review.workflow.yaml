name: github-pr-review
version: "1"
description: "Fetch a GitHub pull request and produce a code review"
trigger_phrases:
  - "run github-pr-review"

# Prerequisites:
#   - gh CLI authenticated: gh auth status
#   - ANTHROPIC_API_KEY set

steps:

  # ── 1. Fetch PR metadata ──────────────────────────────────────────────────────
  - id: fetch-pr
    executor: shell
    vars:
      cmd: >-
        gh pr view "{{.param.input}}"
        --json number,title,body,additions,deletions,changedFiles,reviews,comments,baseRefName,headRefName,author,labels

  # ── 2. Fetch full diff ────────────────────────────────────────────────────────
  - id: fetch-diff
    executor: shell
    vars:
      cmd: gh pr diff "{{.param.input}}"

  # ── 3. Review via Claude Haiku ────────────────────────────────────────────────
  - id: review
    executor: claude
    model: claude-haiku-4-5-20251001
    needs: [fetch-pr, fetch-diff]
    prompt: |
      You are a senior engineer doing a thorough pull request review. Be concise and direct.

      Structure your review:
      1. **Summary** — one sentence on what this PR does
      2. **Critical issues** — bugs, broken invariants, edge cases (flag as MUST FIX)
      3. **Test coverage** — missing scenarios, blind spots in existing tests
      4. **Suggestions** — naming, style, minor improvements (flag as NICE TO HAVE)
      5. **Verdict** — end with exactly one of: APPROVE or REQUEST CHANGES

      PR metadata:
      {{get "step.fetch-pr.data.value" .}}

      Full diff:
      {{get "step.fetch-diff.data.value" .}}

  # ── 4. Submit review to GitHub ────────────────────────────────────────────────
  # Passes review text via GLITCH_REVIEW env var to avoid shell quoting issues.
  # Parses the verdict line to decide --approve vs --request-changes.
  - id: submit
    executor: shell
    needs: [review]
    vars:
      review: '{{get "step.review.data.value" .}}'
      pr: "{{.param.input}}"
      cmd: |
        python3 -c "
        import os, tempfile, subprocess, sys
        body = os.environ['GLITCH_REVIEW']
        pr_url = os.environ['GLITCH_PR']
        action = '--approve' if 'APPROVE' in body and 'REQUEST CHANGES' not in body else '--request-changes'
        with tempfile.NamedTemporaryFile(mode='w', suffix='.md', delete=False) as f:
            f.write(body)
            fname = f.name
        try:
            subprocess.run(['gh', 'pr', 'review', pr_url, action, '--body-file', fname], check=True)
            print('submitted: ' + action.lstrip('-') + ' on ' + pr_url)
        finally:
            os.unlink(fname)
        "

  - id: done
    executor: builtin.log
    needs: [submit]
    args:
      message: |
        ── PR Review ────────────────────────────────────────────────────
        {{get "step.review.data.value" .}}
        ─────────────────────────────────────────────────────────────────
