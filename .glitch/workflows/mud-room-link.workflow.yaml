name: mud-room-link
version: "1"
description: "Generates a new room with NPC, readable items, loot table, and crafting recipe, then injects it"
write_brain: false
game: false

steps:

  # ── 1. Pick room archetype ─────────────────────────────────────────────────
  - id: seed
    executor: shell
    vars:
      cmd: |
        ARCHETYPES=(
          "relay-station: a derelict signal relay, antennae corroded, still broadcasting noise"
          "dead-drop: an unmarked physical cache, hidden behind a false wall in a forgotten sector"
          "extraction-point: a tense emergency egress node, used when runs go wrong"
          "signal-jammer: a shielded chamber that blanks all transmissions, paranoia's home"
          "memory-palace: a private data sanctuary, layered encryption, no unauthorized visitors"
          "ghost-subnet: a cloaked network partition running on borrowed time and stolen cycles"
        )
        IDX=$(( $(date +%s) % 6 ))
        echo "archetype: ${ARCHETYPES[$IDX]}"

  # ── 2a. Try codex (free tier) ─────────────────────────────────────────────
  - id: codex_try
    executor: shell
    needs: [seed]
    vars:
      cmd: |
        SEED="{{get "step.seed.data.value" .}}"
        TMPF=$(mktemp /tmp/mud_codex_XXXXXX.txt)
        TMPOUT=$(mktemp /tmp/mud_codex_out_XXXXXX.txt)
        cat > "$TMPF" << 'PROMPT_END'
        Do not ask clarifying questions. Generate immediately.

        You are a world builder for a cyberpunk text MUD in the tradition of William Gibson
        (Neuromancer, Count Zero), Neal Stephenson (Snow Crash), Pat Cadigan (Synners).
        Gritty near-future, corporate dystopia, hacker underground, digital noir. PG-13.

        Archetype: SEED_PLACEHOLDER

        Generate ONE complete YAML fragment for a new room. Return ONLY raw YAML.
        No markdown fences. No commentary.

        CRITICAL YAML RULES:
        - All text values must be plain text — no asterisks, no markdown emphasis
        - Multi-line content fields must use YAML block scalar (|) format
        - Every id must be globally unique kebab-case
        - Room exits must be exactly: exits: {}
        - NPC must have exactly 2 dialogue entries (trigger: always + one conditional)
        - Conditional trigger must be one of: skill_gte:hacking:2, has_item:data-chip,
          disguise:hazmat-suit, rep_gte:netrunners:5

        EXISTING item IDs (safe to reference as ingredients or loot, do not reuse as new ids):
          data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
          keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
          maintenance-log, cascade-resonator, ice-fragment, response-dampener, neural-jack-mk1

        EXISTING faction IDs — do NOT create entries for these, pick a new one:
          ghost-protocol, null-collective, axiom-security, phantom-collective

        rooms:
          - id: gen-<8 lowercase hex chars>
            name: <evocative 3-5 word name — not: The Grid, The Net, Data Core, Node 0-9>
            desc: <2-3 vivid sentences, sensory detail, cyberpunk texture>
            exits: {}
            npcs:
              - id: <unique-kebab-id>
                name: <NPC name or handle>
                desc: <1 sentence physical description, cyberpunk aesthetic>
                hostile: false
                loot_table_id: <npc-id>-loot
                trades:
                  - id: trade-<npc-id>-1
                    offer_item_id: data-chip
                    offer_item_name: Data Chip
                    receive_item_id: <any existing item id from list above>
                    receive_item_name: <matching name>
                    rep_required: 0
                    faction: none
                dialogue:
                  - trigger: always
                    text: <plain prose, 1-2 sentences, world-weary, in-character>
                  - trigger: <one conditional trigger from the allowed list>
                    text: <plain prose, reveals something useful or dangerous>
            items:
              - id: <new unique kebab id>
                name: <item name>
                desc: <1 sentence>
              - id: <new unique kebab id>-intercept
                name: <Intercepted Memo OR Encrypted Transmission OR Field Report>
                desc: <1 sentence physical description>
                readable: true
                content: |
                  <4-6 lines of in-world operational text.
                  Write as field report, memo, or faction communique.
                  Reference specific factions, codenames, or vulnerabilities.
                  Use dates in YYYY-MM-DD format. Reveal a plot hook.>
            systems: []
            locks: []

        loot_tables:
          - id: <npc-id>-loot
            entries:
              - item_id: data-chip
                name: Data Chip
                desc: A fragment of stolen data, worth something to the right buyer.
                probability: 0.65
                count_min: 1
                count_max: 2
              - item_id: <any existing item id>
                name: <matching name>
                desc: <1 sentence>
                probability: <float 0.25-0.5>
                count_min: 1
                count_max: 2
              - item_id: <new unique kebab id>
                name: <new item name, thematically tied to the room archetype>
                desc: <1 sentence>
                probability: <float 0.15-0.35>
                count_min: 1
                count_max: 1

        crafting_recipes:
          - id: recipe-<unique-kebab>
            name: <recipe name>
            ingredients:
              - {id: <existing item id>, count: 1}
              - {id: <existing item id>, count: 1}
            output:
              id: <new unique output id>
              name: <output name>
              desc: <1-2 sentences — what it does, tied to the room archetype>
            skill_req: <integer 1-3>

        factions:
          - id: <new unique faction id — NOT ghost-protocol, null-collective, axiom-security, phantom-collective>
            name: <faction name, referenced in the readable item content>
            desc: <2-3 sentences — who they are, how they operate>
            agenda: <1 sentence on what they ultimately want>
            territory: []
            allies: []
            enemies: []
        PROMPT_END
        sed -i "s/SEED_PLACEHOLDER/$SEED/" "$TMPF"
        codex exec --full-auto -m codex-mini-latest - -o "$TMPOUT" < "$TMPF" 2>/dev/null
        EXIT=$?
        rm -f "$TMPF"
        if [ $EXIT -eq 0 ] && [ -s "$TMPOUT" ]; then
            cat "$TMPOUT"
        fi
        rm -f "$TMPOUT"

  # ── 2b. Fallback: generate via Haiku if codex produced nothing ────────────
  - id: generate
    executor: claude
    no_clarify: true
    model: claude-haiku-4-5-20251001
    needs: [seed, codex_try]
    prompt: |
      Do not ask clarifying questions. Generate immediately.
      {{- $codex := get "step.codex_try.data.value" . }}
      {{- if $codex }}

      Codex has already generated the following YAML. Output it VERBATIM — do not change a single character, do not add commentary, do not reformat.

      {{ $codex }}
      {{- else }}

      You are a world builder for a cyberpunk text MUD in the tradition of William Gibson
      (Neuromancer, Count Zero), Neal Stephenson (Snow Crash), Pat Cadigan (Synners).
      Gritty near-future, corporate dystopia, hacker underground, digital noir. PG-13.

      Archetype: {{get "step.seed.data.value" .}}

      Generate ONE complete YAML fragment for a new room. Return ONLY raw YAML.
      No markdown fences. No commentary.

      CRITICAL YAML RULES:
      - All text values must be plain text — no asterisks, no markdown emphasis
      - Multi-line content fields must use YAML block scalar (|) format
      - Every id must be globally unique kebab-case
      - Room exits must be exactly: exits: {}
      - NPC must have exactly 2 dialogue entries (trigger: always + one conditional)
      - Conditional trigger must be one of: skill_gte:hacking:2, has_item:data-chip,
        disguise:hazmat-suit, rep_gte:netrunners:5

      EXISTING item IDs (safe to reference as ingredients or loot, do not reuse as new ids):
        data-chip, raw-silicon, copper-wire, carbon-blade, ice-pick, packet-sniffer,
        keycard, hazmat-suit, decryption-key, server-core, coolant-cartridge,
        maintenance-log, cascade-resonator, ice-fragment, response-dampener, neural-jack-mk1

      EXISTING faction IDs — do NOT create entries for these, pick a new one:
        ghost-protocol, null-collective, axiom-security, phantom-collective

      rooms:
        - id: gen-<8 lowercase hex chars>
          name: <evocative 3-5 word name — not: The Grid, The Net, Data Core, Node 0-9>
          desc: <2-3 vivid sentences, sensory detail, cyberpunk texture>
          exits: {}
          npcs:
            - id: <unique-kebab-id>
              name: <NPC name or handle>
              desc: <1 sentence physical description, cyberpunk aesthetic>
              hostile: false
              loot_table_id: <npc-id>-loot
              trades:
                - id: trade-<npc-id>-1
                  offer_item_id: data-chip
                  offer_item_name: Data Chip
                  receive_item_id: <any existing item id from list above>
                  receive_item_name: <matching name>
                  rep_required: 0
                  faction: none
              dialogue:
                - trigger: always
                  text: <plain prose, 1-2 sentences, world-weary, in-character>
                - trigger: <one conditional trigger from the allowed list>
                  text: <plain prose, reveals something useful or dangerous>
          items:
            - id: <new unique kebab id>
              name: <item name>
              desc: <1 sentence>
            - id: <new unique kebab id>-intercept
              name: <Intercepted Memo OR Encrypted Transmission OR Field Report>
              desc: <1 sentence physical description>
              readable: true
              content: |
                <4-6 lines of in-world operational text.
                Write as field report, memo, or faction communique.
                Reference specific factions, codenames, or vulnerabilities.
                Use dates in YYYY-MM-DD format. Reveal a plot hook.>
          systems: []
          locks: []

      loot_tables:
        - id: <npc-id>-loot
          entries:
            - item_id: data-chip
              name: Data Chip
              desc: A fragment of stolen data, worth something to the right buyer.
              probability: 0.65
              count_min: 1
              count_max: 2
            - item_id: <any existing item id>
              name: <matching name>
              desc: <1 sentence>
              probability: <float 0.25-0.5>
              count_min: 1
              count_max: 2
            - item_id: <new unique kebab id>
              name: <new item name, thematically tied to the room archetype>
              desc: <1 sentence>
              probability: <float 0.15-0.35>
              count_min: 1
              count_max: 1

      crafting_recipes:
        - id: recipe-<unique-kebab>
          name: <recipe name>
          ingredients:
            - {id: <existing item id>, count: 1}
            - {id: <existing item id>, count: 1}
          output:
            id: <new unique output id>
            name: <output name>
            desc: <1-2 sentences — what it does, tied to the room archetype>
          skill_req: <integer 1-3>

      factions:
        - id: <new unique faction id — NOT ghost-protocol, null-collective, axiom-security, phantom-collective>
          name: <faction name, referenced in the readable item content>
          desc: <2-3 sentences — who they are, how they operate>
          agenda: <1 sentence on what they ultimately want>
          territory: []
          allies: []
          enemies: []
      {{- end }}

  # ── 3. Inject into world.yaml ──────────────────────────────────────────────
  - id: inject
    executor: mud-worldgen-inject
    needs: [generate]
    prompt: "{{get \"step.generate.data.value\" .}}"

  # ── 4. Commit to main ─────────────────────────────────────────────────────
  - id: commit
    executor: shell
    needs: [inject]
    vars:
      cmd: |
        cd ~/Projects/gl1tch-mud
        git add worlds/cyberspace/world.yaml
        git diff --cached --quiet && echo "nothing to commit" && exit 0
        git commit -m "chore(world): room-link — $(date +%Y-%m-%d)"
        git push origin main
