name: support-digest
version: "1"

# Run from ~/Projects/farm so {{cwd}} resolves to the farm repo root.
# Usage: cd ~/Projects/farm && orcai pipeline run support-digest

steps:

  # ── 0. Get today's date ───────────────────────────────────────────────────
  - id: today
    plugin: shell
    vars:
      cmd: "date +%Y-%m-%d"

  # ── 1. Fetch support email IDs ────────────────────────────────────────────
  - id: fetch_email_ids
    plugin: gws-gmail
    vars:
      args: "users messages list --params '{\"userId\":\"me\",\"q\":\"(from:support@marketspread.com OR to:support@marketspread.com) newer_than:1d\",\"maxResults\":50}' --format json"

  # ── 2. Fetch full email content ───────────────────────────────────────────
  - id: fetch_email_details
    plugin: gws-gmail-fetch-all
    needs: [fetch_email_ids]
    prompt: "{{step.fetch_email_ids.data.value}}"

  # ── 3. Research issues in codebase + DB ──────────────────────────────────
  - id: research_issues
    plugin: claude
    model: claude-sonnet-4-6
    needs: [fetch_email_details]
    prompt: |
      You are a senior engineer at MarketSpread investigating support issues.
      Working directory: {{cwd}} (the farm Django codebase).

      Support emails:
      {{step.fetch_email_details.data.value}}

      If no messages, output {"issues":[]} and stop.

      For each issue:
      1. CODEBASE — grep/read farmsupport/, farmserver/, farmreport/ for relevant code.
      2. DATABASE — use the db-query skill to run targeted queries:
         - Affected user: SELECT id,email FROM auth_user WHERE email='...'
         - Market/vendor: ILIKE search on farmserver_market / farmserver_vendor
         - Recent invoices/orders for the affected entity
      3. ROOT CAUSE — code bug vs data issue?
      4. RESOLUTION — provide specific step-by-step resolution instructions (SQL fixes,
         config changes, code pointers) so support staff can act immediately.

      Output JSON only:
      {"issues":[{
        "email_id":"...","subject":"...","from":"...","date":"...","summary":"...",
        "relevant_files":["..."],"db_findings":"...","likely_cause":"...",
        "recommended_action":"...","resolution_steps":"..."
      }]}

  # ── 4. Compile digest ─────────────────────────────────────────────────────
  - id: compile_report
    plugin: claude
    model: claude-sonnet-4-6
    needs: [today, research_issues]
    prompt: |
      Today's date is {{step.today.data.value}}.

      Compile a MarketSpread support digest from the research findings below.
      Focus entirely on the customer support issues and their resolutions.

      Research findings:
      {{step.research_issues.data.value}}

      Write exactly two XML-tagged sections and nothing else outside them:

      <doc>
      # MarketSpread Support Digest — {{step.today.data.value}}

      ## Summary
      [1-3 sentence executive summary of all issues]

      ## Issues
      ### [subject / ticket number]
      **From:** ... **Date:** ...
      **Summary:** ...
      **Technical findings:** [relevant code files and DB query results]
      **Root cause:** ...
      **Resolution:** [specific step-by-step — SQL, config, code fix]
      **Action:** [what support staff should do right now]
      ---
      [repeat per issue]

      ## Overall Recommendations
      [patterns or systemic fixes across all issues]
      </doc>

      <email>
      Hi team,

      Support digest for the last 24 hours:

      [one line per issue: ticket# — subject — one-sentence summary]

      Full report: GOOGLE_DOC_URL

      Thanks
      </email>

  # ── 5a. Find or create today's Google Doc ────────────────────────────────
  - id: create_doc
    plugin: gws-docs-upsert
    needs: [compile_report]
    vars:
      title: "MarketSpread Support Digest — {{step.today.data.value}}"

  # ── 5b. Insert report content into doc ───────────────────────────────────
  - id: insert_doc_content
    plugin: gws-docs-insert
    needs: [compile_report, create_doc]
    prompt: |
      {{step.create_doc.data.value}}
      {{step.compile_report.data.value}}

  # ── 6. Create Gmail draft ─────────────────────────────────────────────────
  - id: create_draft
    plugin: gws-gmail-draft
    needs: [compile_report, insert_doc_content]
    prompt: |
      {{step.insert_doc_content.data.value}}
      {{step.compile_report.data.value}}
