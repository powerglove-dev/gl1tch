services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: glitch-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - glitch-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: glitch-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      # Point Kibana at the in-network ES container. Using the docker
      # service DNS name (`elasticsearch`) instead of localhost so this
      # works the same on macOS, Linux, and any future remote-host
      # compose runs.
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=glitch-kibana
      - SERVER_HOST=0.0.0.0
      # No security on the local dev cluster — matches the ES service
      # above. The Kibana UI is reachable at http://localhost:5601 with
      # zero auth, which is what gl1tch's bootstrap code assumes.
      - XPACK_SECURITY_ENABLED=false
      - XPACK_REPORTING_ENABLED=false
      # Quiet the "encryption keys not set" warnings on every restart.
      # These are local-dev throwaway values; the real cluster (if you
      # ever stand one up) should set them via secrets.
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=glitch_local_dev_encryption_key_32b
      - XPACK_REPORTING_ENCRYPTIONKEY=glitch_local_dev_reporting_key_32bytes_x
      - XPACK_SECURITY_ENCRYPTIONKEY=glitch_local_dev_security_key_32bytes_xx
    ports:
      - "5601:5601"
    volumes:
      - glitch-kibana-data:/usr/share/kibana/data
    healthcheck:
      # /api/status returns 200 once Kibana has finished its plugin
      # initialization and is actually serving the UI — anything earlier
      # races against EnsureKibanaDataViews from glitchd startup.
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.17.0
    container_name: glitch-apm
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    ports:
      # 8200 is apm-server's single listener — serves the native APM
      # intake endpoint, OTLP/gRPC, and OTLP/HTTP on the same port
      # (distinguished by protocol). glitch's telemetry.Setup wires an
      # otlptracegrpc exporter pointed here so every span emitted by
      # the CLI + desktop also lands in traces-apm-*, powering Kibana's
      # APM UI on top of our existing flat glitch-traces index.
      - "8200:8200"
    command: >
      apm-server -e
      -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
      -E apm-server.host=0.0.0.0:8200
      -E apm-server.auth.anonymous.enabled=true
      -E apm-server.auth.anonymous.allow_agent=["*"]
      -E apm-server.auth.anonymous.allow_service=["*"]
      -E apm-server.auth.anonymous.rate_limit.event_limit=10000
      -E apm-server.auth.anonymous.rate_limit.ip_limit=1000
      -E apm-server.rum.enabled=false
      -E apm-server.kibana.enabled=true
      -E apm-server.kibana.host=http://kibana:5601
      -E setup.kibana.host=http://kibana:5601
    healthcheck:
      # /healthcheck returns 200 once apm-server is ready to ingest.
      # Wait on this so desktop startup doesn't see connection refused
      # on its first batch.
      test: ["CMD-SHELL", "curl -sf http://localhost:8200/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  glitch-es-data:
  glitch-kibana-data:
