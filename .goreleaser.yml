# .goreleaser.yml — GoReleaser configuration for GLITCH
# https://goreleaser.com
version: 2

project_name: glitch

builds:
  - id: glitch
    binary: glitch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude windows/arm64 — not a supported target
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  # Core provider plugins — cloned from github.com/8op-org/gl1tch-executors
  # by the release workflow before GoReleaser runs.
  - id: glitch-claude
    binary: glitch-claude
    dir: ../gl1tch-executors/plugins/claude
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

  - id: glitch-github-copilot
    binary: glitch-github-copilot
    dir: ../gl1tch-executors/plugins/github-copilot
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

  - id: glitch-codex
    binary: glitch-codex
    dir: ../gl1tch-executors/plugins/codex
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

  - id: glitch-gemini
    binary: glitch-gemini
    dir: ../gl1tch-executors/plugins/gemini
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

  - id: glitch-opencode
    binary: glitch-opencode
    dir: ../gl1tch-executors/plugins/opencode
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

  - id: glitch-ollama
    binary: glitch-ollama
    dir: ../gl1tch-executors/plugins/ollama
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: default
    # .tar.gz for POSIX systems, .zip for Windows
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Bundle sidecar YAML files and the install script alongside the binaries.
    files:
      - src: ../gl1tch-executors/plugins/claude/claude.yaml
        dst: wrappers
      - src: ../gl1tch-executors/plugins/github-copilot/github-copilot.yaml
        dst: wrappers
      - src: ../gl1tch-executors/plugins/codex/codex.yaml
        dst: wrappers
      - src: ../gl1tch-executors/plugins/gemini/gemini.yaml
        dst: wrappers
      - src: ../gl1tch-executors/plugins/opencode/opencode.yaml
        dst: wrappers
      - src: ../gl1tch-executors/plugins/ollama/ollama.yaml
        dst: wrappers
      - src: install.sh
        dst: .

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - name: glitch
    ids:
      - glitch
    repository:
      owner: 8op-org
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/8op-org/gl1tch"
    description: "gl1tch — AI-native terminal task manager"
    license: "MIT"
    install: |
      bin.install "glitch"
    test: |
      assert_match version.to_s, shell_output("#{bin}/glitch --version")
    skip_upload: false

changelog:
  use: git
  sort: asc
  groups:
    - title: "Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance Improvements"
      regexp: "^perf"
      order: 2
    - title: "Refactoring"
      regexp: "^refactor"
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^ci"
      - "^test"
      - "^style"
