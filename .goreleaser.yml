# .goreleaser.yml — GoReleaser configuration for ORCAI
# https://goreleaser.com
version: 2

builds:
  - id: orcai
    binary: orcai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude windows/arm64 — not a supported target
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    # .tar.gz for POSIX systems, .zip for Windows
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: conventional_commits
  groups:
    - title: "Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance Improvements"
      regexp: "^perf"
      order: 2
    - title: "Refactoring"
      regexp: "^refactor"
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^docs"
      - "^ci"
      - "^test"
      - "^style"
